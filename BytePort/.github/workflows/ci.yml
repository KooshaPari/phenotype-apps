# ci.yml — BytePort continuous integration
#
# All language build/test/lint gates. The audit/security/quality jobs that
# don't gate PRs live in audit.yml. Release/draft/SBOM live in release.yml.
#
# Triggers: push to main/master, pull_request, manual dispatch.
# Concurrency: one in-flight run per ref; new commits cancel old runs.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  # ---------- Go ----------
  go-vet:
    name: Go vet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        module:
          - backend/byteport
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

  go-build:
    name: Go build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        module:
          - backend/byteport
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: go build
        working-directory: ${{ matrix.module }}
        run: go build ./...

  go-test:
    name: Go test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend/byteport
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: backend/byteport/go.mod
          cache-dependency-path: backend/byteport/go.sum
      - name: go test
        run: go test ./...

  go-fmt:
    name: Go fmt (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l backend/byteport backend/nvms)
          if [ -n "$unformatted" ]; then
            echo "::warning::The following files are not gofmt-clean (advisory; does not block merge):"
            echo "$unformatted"
            exit 1
          fi

  go-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: backend/byteport/go.mod
          cache-dependency-path: backend/byteport/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee
        with:
          version: latest
          working-directory: backend/byteport
          args: --disable=staticcheck --disable=errcheck

  # ---------- Rust ----------
  rust-machete:
    name: Cargo machete (unused deps)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install cargo-machete
        uses: taiki-e/install-action@25435dc8dd3baed7417e0c96d3fe89013a5b2e09
        with:
          tool: cargo-machete
      - name: Run cargo machete
        run: cargo machete .

  # ---------- Pre-commit (gates slow hooks to CI) ----------
  pre-commit:
    name: pre-commit (auto + manual)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: '3.12'
      - name: Run pre-commit
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        with:
          extra_args: --hook-stage manual --all-files
