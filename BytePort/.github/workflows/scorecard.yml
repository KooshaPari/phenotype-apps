# scorecard.yml — BytePort OpenSSF Scorecard
#
# Weekly supply-chain posture check. Publishes SARIF to the Security tab.
#
# Triggers: branch_protection_rule, weekly schedule, push to main, manual.
# Concurrency: one in-flight run per ref; new commits cancel old runs.

name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '17 3 * * 6'  # Saturdays 03:17 UTC
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  analysis:
    timeout-minutes: 20
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Run Scorecard
        uses: ossf/scorecard-action@99c09fe975337306107572b4fdf4db224cf8e2f2 # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5
      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@ed410739ba306e4ebe5e123421a6bd694e494a2b # v4
        with:
          sarif_file: results.sarif
