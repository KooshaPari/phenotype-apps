# release.yml — BytePort release pipeline
#
# Consolidates:
#   - Tag-driven GitHub release creation (was: release.yml)
#   - Release-drafter draft updates on push to main (was: release-drafter.yml)
#   - Monthly SBOM refresh via shared workflow (was: sbom-refresh.yml)
#
# Triggers: tag push (v*), push to main (drafter), monthly cron (sbom), manual.
# Concurrency: shared group; per-ref cancellation to avoid stale drafter runs.

name: Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  schedule:
    - cron: '0 0 1 * *'  # 1st of each month — SBOM refresh
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  # ---------- On tag: publish GitHub release ----------
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30
    name: Publish GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------- On push to main: refresh release draft ----------
  draft:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    name: Update release draft
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Update release draft
        uses: release-drafter/release-drafter@693d20e7c1ce1a81d3a41962f85914253b518449 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------- Monthly: refresh SBOM ----------
  sbom-refresh:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    name: Monthly SBOM refresh
    uses: KooshaPari/phenotype-tooling/.github/workflows/sbom-monthly.yml@79dff2b798fb8a3bc64237e4b2d054a08d3a4601
    with:
      repo_path: '.'
      build_system: 'rust'
