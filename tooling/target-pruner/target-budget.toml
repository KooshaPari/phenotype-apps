# Phenotype Target/ Directory Budget Configuration
# Location: ~/.config/phenotype/target-budget.toml
# Fallback: embedded defaults if file is missing

[global]
# Default max size per repo target/ directory
max_size_bytes = 2147483648  # 2 GB

# Default number of days before a target/ becomes eligible for pruning
prune_days = 7

# Keep targets untouched if repo has commits within N days
keep_active_days = 2

# Per-repo overrides
[repos.AgilePlus]
max_size_bytes = 3221225472  # 3 GB (more builds)
keep_active_days = 1         # Very active

[repos.PhenoAgent]
max_size_bytes = 1610612736  # 1.5 GB
prune_days = 5

[repos.phenotype-infrakit]
exclude = false              # Always check this repo

# Reference: Add repo overrides as needed
# [repos."repo-name"]
# max_size_bytes = 536870912  # 512 MB for lean repos
# keep_active_days = 3
# exclude = false             # Set to true to skip this repo entirely
