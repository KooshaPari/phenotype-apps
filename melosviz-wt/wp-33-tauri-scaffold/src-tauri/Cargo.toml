[package]
name = "melosviz"
version = "0.1.0"
description = "Tauri: scaffold (src-tauri/Cargo.toml + tauri.conf.json) (WP-33)"
authors = ["KooshaPari"]
edition = "2021"
rust-version = "1.77"

[lib]
name = "melosviz_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[features]
custom-protocol = ["tauri/custom-protocol"]
