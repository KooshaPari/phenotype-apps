name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests examples

      - name: Type check (mypy)
        run: mypy src

      - name: Test + coverage
        env:
          OTEL_SDK_DISABLED: "true"
        run: pytest

      - name: Coverage gate
        run: |
          if [ "$(coverage report --format=total 2>/dev/null || echo 0)" -lt 80 ]; then
            echo "Coverage below 80% — failing gate"
            exit 1
          fi