id = "student-canvas"
name = "Student — Canvas-driven"
version = "0.1.0"
author = "focalpoint-team"
description = "Reward credits on assignment submission and good grades; block social apps when an assignment is due within 24h. Built for Canvas LMS users."
recommended_connectors = ["canvas", "gcal"]

[mascot_copy]
session_start = "Work mode on. Social is locked while you study."
session_end = "Nice session. Go enjoy the break."

# Reward — credit on submission
[[rules]]
id = "canvas-submit-reward"
name = "Credit on assignment submission"
priority = 50
cooldown_seconds = 60
explanation_template = "Submitted {payload.assignment.name} — +25 credits."
enabled = true
trigger = { kind = "event", value = "canvas:assignment_submitted" }
actions = [
  { type = "grant_credit", amount = 25 },
  { type = "streak_increment", name = "submissions" },
]

# Reward — extra credit on high grade
[[rules]]
id = "canvas-high-grade-bonus"
name = "Bonus on ≥90% grade"
priority = 60
cooldown_seconds = 60
explanation_template = "Graded ≥90% on {payload.assignment.name} — +50 bonus."
enabled = true
trigger = { kind = "event", value = "canvas:submission_graded" }
conditions = [
  { kind = "payload_gte", params = { path = "percentage", min = 0.9 } },
]
actions = [
  { type = "grant_credit", amount = 50 },
]

# Block — lock social when deadline looms
[[rules]]
id = "canvas-deadline-lockdown"
name = "Lock social 24h before deadline"
priority = 90
cooldown_seconds = 3600
duration_seconds = 86400
explanation_template = "Deadline in <24h for {payload.assignment.name} — social locked."
enabled = true
trigger = { kind = "event", value = "canvas:assignment_due_soon" }
conditions = [
  { kind = "payload_lte", params = { path = "hours_until_due", max = 24 } },
]
actions = [
  { type = "block", profile = "social", duration_seconds = 86400, rigidity = "soft" },
  { type = "notify", message = "Deadline incoming — social locked until you submit." },
]
