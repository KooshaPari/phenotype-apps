id = "dev-flow"
name = "Developer — GitHub-driven flow"
version = "0.1.0"
author = "focalpoint-team"
description = "Credit meaningful code output (merged PRs, closed issues), streak daily commits, gentle intervention when you're bouncing between repos."
recommended_connectors = ["github", "gcal"]

[mascot_copy]
session_start = "Heads down. I've got the interrupts."
session_end = "Shipped. Go stretch."

# Reward — merged PR
[[rules]]
id = "github-pr-merged"
name = "Credit on merged PR"
priority = 50
cooldown_seconds = 30
explanation_template = "PR merged in {payload.repo} — +40 credits."
enabled = true
trigger = { kind = "event", value = "github.pr.merged" }
actions = [
  { type = "grant_credit", amount = 40 },
  { type = "streak_increment", name = "prs_merged" },
]

# Reward — issue closed
[[rules]]
id = "github-issue-closed"
name = "Credit on issue close"
priority = 40
cooldown_seconds = 30
explanation_template = "Closed issue in {payload.repo} — +15 credits."
enabled = true
trigger = { kind = "event", value = "github.issue.closed" }
actions = [
  { type = "grant_credit", amount = 15 },
]

# Streak — daily commits
[[rules]]
id = "github-daily-streak"
name = "Daily commit streak"
priority = 30
cooldown_seconds = 82800
explanation_template = "Committed today — streak +1."
enabled = true
trigger = { kind = "event", value = "github.push" }
actions = [
  { type = "streak_increment", name = "daily_commits" },
]

# Schedule — morning focus block on weekdays 09:00
[[rules]]
id = "dev-morning-focus"
name = "Weekday morning deep focus"
priority = 70
cooldown_seconds = 3600
duration_seconds = 5400
explanation_template = "Morning deep-focus window — social locked 09:00–10:30."
enabled = true
trigger = { kind = "schedule", value = "0 0 9 * * 1-5" }
actions = [
  { type = "block", profile = "social", duration_seconds = 5400, rigidity = "soft" },
  { type = "notify", message = "Deep focus — 90 min. Social is semi-locked, bypass costs 10 credits." },
]
