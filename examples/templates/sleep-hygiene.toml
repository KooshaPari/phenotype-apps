id = "sleep-hygiene"
name = "Sleep hygiene"
version = "0.1.0"
author = "focalpoint-team"
description = "Hard lockdown on entertainment apps 23:00–06:00, streak rewards for reporting ≥7h sleep, gentle intervention when sleep debt grows."
recommended_connectors = ["gcal"]

[mascot_copy]
session_start = "Wind-down mode. Phone stays quiet."
session_end = "Morning. How did you sleep?"

# Schedule — nightly lockdown 23:00–06:00
[[rules]]
id = "nightly-lockdown"
name = "Nightly entertainment lockdown"
priority = 95
cooldown_seconds = 3600
duration_seconds = 25200
explanation_template = "Nightly lockdown — entertainment apps closed until morning."
enabled = true
trigger = { kind = "schedule", value = "0 0 23 * * *" }
actions = [
  { type = "block", profile = "entertainment", duration_seconds = 25200, rigidity = "hard" },
  { type = "notify", message = "Wind-down. Entertainment is locked until 06:00." },
]

# Reward — report ≥7h sleep
[[rules]]
id = "good-sleep-reward"
name = "Credit for ≥7h sleep"
priority = 40
cooldown_seconds = 43200
explanation_template = "Reported {payload.hours}h sleep — +30 credits."
enabled = true
trigger = { kind = "event", value = "focus:sleep_reported" }
conditions = [
  { kind = "payload_gte", params = { path = "hours", min = 7.0 } },
]
actions = [
  { type = "grant_credit", amount = 30 },
  { type = "streak_increment", name = "good_sleep" },
]

# Intervention — sleep debt > 3h cumulative
[[rules]]
id = "sleep-debt-nudge"
name = "Gentle nudge on sleep debt"
priority = 60
cooldown_seconds = 86400
explanation_template = "Sleep debt is {payload.hours}h — let's catch up tonight."
enabled = true
trigger = { kind = "event", value = "focus:sleep_debt_reported" }
conditions = [
  { kind = "payload_gte", params = { path = "hours", min = 3.0 } },
]
actions = [
  { type = "notify", message = "Sleep debt is catching up. Try turning in an hour earlier tonight." },
]
