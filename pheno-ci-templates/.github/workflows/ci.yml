name: CI

# ---------------------------------------------------------------------------
# pheno-ci-templates — canonical reusable CI workflow (L3 #58)
#
# Consumed by every pheno-* crate / app / SDK in the fleet via:
#
#   jobs:
#     ci:
#       uses: KooshaPari/pheno-ci-templates/.github/workflows/ci.yml@main
#       with:
#         rust_msrv: "1.75"
#         python_version: "3.11"
#         go_version: "1.22"
#         node_version: "20"
#         run_coverage: false
#         run_clippy: true
#
# Every input has a sensible default so a one-line `uses:` works for the
# common case. All job-level steps can be toggled independently.
# ---------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      rust_msrv:
        description: "Rust MSRV (minimum supported rust version) — pinned in rust-toolchain.toml"
        required: false
        type: string
        default: "1.75"
      python_version:
        description: "Python version to install via actions/setup-python (e.g. 3.11, 3.12)"
        required: false
        type: string
        default: "3.11"
      go_version:
        description: "Go version to install via actions/setup-go (e.g. 1.22, 1.23)"
        required: false
        type: string
        default: "1.22"
      node_version:
        description: "Node.js version to install via actions/setup-node (e.g. 18, 20, 22)"
        required: false
        type: string
        default: "20"
      run_coverage:
        description: "Whether to run coverage reporting (cargo-llvm-cov, pytest-cov, go cover)"
        required: false
        type: boolean
        default: false
      run_clippy:
        description: "Whether to run cargo clippy with -D warnings on the rust job"
        required: false
        type: boolean
        default: true
    secrets:
      # Pass-through secrets so callers can opt-in to publishing / signing
      # from within the reusable workflow without re-declaring them.
      CARGO_REGISTRY_TOKEN:
        required: false
      NPM_TOKEN:
        required: false
      PYPI_TOKEN:
        required: false
      GITHUB_TOKEN:
        required: false

  # Allow manual triggering from the Actions tab — useful for ad-hoc runs
  # of the template itself, and for verifying the reusable workflow
  # before wiring it into a downstream consumer.
  workflow_dispatch:
    inputs:
      rust_msrv:
        description: "Rust MSRV"
        required: false
        type: string
        default: "1.75"
      python_version:
        description: "Python version"
        required: false
        type: string
        default: "3.11"
      go_version:
        description: "Go version"
        required: false
        type: string
        default: "1.22"
      node_version:
        description: "Node.js version"
        required: false
        type: string
        default: "20"
      run_coverage:
        description: "Run coverage"
        required: false
        type: boolean
        default: false
      run_clippy:
        description: "Run cargo clippy with -D warnings"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # rust — `cargo fmt --check`, `cargo clippy`, `cargo test`, optional
  # `cargo llvm-cov` summary. Triggered by the presence of a Cargo.toml in
  # the caller's working directory; skipped when no Rust manifest exists
  # (the auto-detect `if:` check).
  # -----------------------------------------------------------------------
  rust:
    name: Rust (MSRV ${{ inputs.rust_msrv }})
    runs-on: ubuntu-latest
    if: hashFiles('**/Cargo.toml') != ''
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (${{ inputs.rust_msrv }})
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust_msrv }}
          components: clippy, rustfmt

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .cargo-cache
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (--all-targets, -D warnings)
        if: ${{ inputs.run_clippy }}
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all-features --no-fail-fast

      - name: cargo llvm-cov (summary)
        if: ${{ inputs.run_coverage }}
        run: |
          cargo install cargo-llvm-cov --locked
          cargo llvm-cov --all-features --workspace --summary-only
        env:
          INSTRUFLAGS: "-O0"

  # -----------------------------------------------------------------------
  # python — pip install -e ., pytest. Triggered by the presence of
  # pyproject.toml or setup.py. The pinned `python_version` is provided
  # via actions/setup-python and surfaced as a matrix-free single env.
  # -----------------------------------------------------------------------
  python:
    name: Python (${{ inputs.python_version }})
    runs-on: ubuntu-latest
    if: hashFiles('**/pyproject.toml') != '' || hashFiles('**/setup.py') != ''
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pytest
        run: pytest --maxfail=1 --tb=short

      - name: pytest (coverage)
        if: ${{ inputs.run_coverage }}
        run: |
          pip install pytest-cov
          pytest --cov=src --cov-report=term-missing

  # -----------------------------------------------------------------------
  # go — `go mod download`, `go vet`, `go test`, optional `go test -cover`.
  # Triggered by the presence of go.mod.
  # -----------------------------------------------------------------------
  go:
    name: Go (${{ inputs.go_version }})
    runs-on: ubuntu-latest
    if: hashFiles('**/go.mod') != ''
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go ${{ inputs.go_version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

      - name: go test (coverage)
        if: ${{ inputs.run_coverage }}
        run: go test -cover -coverprofile=coverage.out ./... && go tool cover -func=coverage.out

  # -----------------------------------------------------------------------
  # node — `npm ci`, `npm test`, optional coverage. Triggered by the
  # presence of package.json. node_version flows via actions/setup-node.
  # -----------------------------------------------------------------------
  node:
    name: Node (${{ inputs.node_version }})
    runs-on: ubuntu-latest
    if: hashFiles('**/package.json') != ''
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ inputs.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: npm ci
        run: npm ci

      - name: npm test
        run: npm test -- --watch=false

      - name: npm test (coverage)
        if: ${{ inputs.run_coverage }}
        run: npm test -- --watch=false --coverage

  # -----------------------------------------------------------------------
  # aggregate — pass-or-fail summary, depends on every detected language
  # job above. Skipped when none of the language manifests exist.
  # -----------------------------------------------------------------------
  summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [rust, python, go, node]
    if: |
      always() &&
      (hashFiles('**/Cargo.toml') != '' ||
       hashFiles('**/pyproject.toml') != '' ||
       hashFiles('**/setup.py') != '' ||
       hashFiles('**/go.mod') != '' ||
       hashFiles('**/package.json') != '')
    steps:
      - name: Aggregate results
        run: |
          echo "rust   = ${{ needs.rust.result }}"
          echo "python = ${{ needs.python.result }}"
          echo "go     = ${{ needs.go.result }}"
          echo "node   = ${{ needs.node.result }}"
          if [[ "${{ needs.rust.result }}"   == "failure" || \
                "${{ needs.python.result }}" == "failure" || \
                "${{ needs.go.result }}"     == "failure" || \
                "${{ needs.node.result }}"   == "failure" ]]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "All detected language jobs passed."
