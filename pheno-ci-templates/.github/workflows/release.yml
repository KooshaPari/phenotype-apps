name: Release

# ---------------------------------------------------------------------------
# pheno-ci-templates — canonical release workflow (L3 #58)
#
# Triggered on tag push of the form `v*` (e.g. v1.2.3). Each language's
# publish step is gated by a `run_<lang>` input so a single-tag push can
# release only the subset of artifacts the calling repo owns. All
# publishing steps are no-ops when the corresponding input is false.
#
# Per-language feature flags:
#   * run_cargo_build    — `cargo build --release` and `cargo publish`
#   * run_npm_publish    — `npm publish` (publishes the current package)
#   * run_pip_build      — `python -m build` and `twine upload` to PyPI
#   * run_go_install     — `go install` to publish a Go binary / module
#
# Consumers wire this in by calling it as a reusable workflow from their
# own release.yml. The simpler "drop this file in your .github/workflows/"
# path is also supported because the workflow runs on tag push from any
# repo that has these templates vendored.
# ---------------------------------------------------------------------------

on:
  push:
    tags:
      - "v*"
      - "release/*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (defaults to the trigger ref)"
        required: false
        type: string
      run_cargo_build:
        description: "Run cargo build/publish"
        required: false
        type: boolean
        default: true
      run_npm_publish:
        description: "Run npm publish"
        required: false
        type: boolean
        default: true
      run_pip_build:
        description: "Run pip build + twine upload"
        required: false
        type: boolean
        default: true
      run_go_install:
        description: "Run go install"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release (${{ github.ref_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${{ inputs.tag }}" ]]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}

      # -----------------------------------------------------------------
      # Rust — `cargo build --release` + `cargo publish` to crates.io.
      # Gated on `run_cargo_build`; no-op when the caller disables it.
      # -----------------------------------------------------------------
      - name: Install Rust toolchain (stable)
        if: ${{ inputs.run_cargo_build != false && hashFiles('**/Cargo.toml') != '' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: cargo build --release
        if: ${{ inputs.run_cargo_build != false && hashFiles('**/Cargo.toml') != '' }}
        run: cargo build --release --all-features

      - name: cargo publish (dry-run)
        if: ${{ inputs.run_cargo_build != false && hashFiles('**/Cargo.toml') != '' }}
        run: cargo publish --dry-run --allow-dirty --all-features

      - name: cargo publish
        if: ${{ inputs.run_cargo_build != false && hashFiles('**/Cargo.toml') != '' }}
        run: cargo publish --all-features
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # -----------------------------------------------------------------
      # Node — `npm publish` (assumes package.json + .npmrc).
      # Gated on `run_npm_publish`; no-op when the caller disables it.
      # -----------------------------------------------------------------
      - name: Set up Node 20
        if: ${{ inputs.run_npm_publish != false && hashFiles('**/package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: npm ci
        if: ${{ inputs.run_npm_publish != false && hashFiles('**/package.json') != '' }}
        run: npm ci

      - name: npm test (pre-publish gate)
        if: ${{ inputs.run_npm_publish != false && hashFiles('**/package.json') != '' }}
        run: npm test -- --watch=false

      - name: npm publish
        if: ${{ inputs.run_npm_publish != false && hashFiles('**/package.json') != '' }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # -----------------------------------------------------------------
      # Python — `python -m build` + `twine upload` to PyPI.
      # Gated on `run_pip_build`; no-op when the caller disables it.
      # -----------------------------------------------------------------
      - name: Set up Python 3.11
        if: ${{ inputs.run_pip_build != false && (hashFiles('**/pyproject.toml') != '' || hashFiles('**/setup.py') != '') }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build + twine
        if: ${{ inputs.run_pip_build != false && (hashFiles('**/pyproject.toml') != '' || hashFiles('**/setup.py') != '') }}
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: python -m build (wheel + sdist)
        if: ${{ inputs.run_pip_build != false && (hashFiles('**/pyproject.toml') != '' || hashFiles('**/setup.py') != '') }}
        run: python -m build --wheel --sdist

      - name: twine check
        if: ${{ inputs.run_pip_build != false && (hashFiles('**/pyproject.toml') != '' || hashFiles('**/setup.py') != '') }}
        run: twine check dist/*

      - name: twine upload (PyPI)
        if: ${{ inputs.run_pip_build != false && (hashFiles('**/pyproject.toml') != '' || hashFiles('**/setup.py') != '') }}
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      # -----------------------------------------------------------------
      # Go — `go install` (publishes a binary to $GOBIN / installs the
      # module). Gated on `run_go_install`; no-op when the caller
      # disables it. The auth step is intentionally omitted — consumers
      # that need GOPROXY credentials should set GOPROXY_AUTH or
      # equivalent in their own release pipeline.
      # -----------------------------------------------------------------
      - name: Set up Go 1.22
        if: ${{ inputs.run_go_install != false && hashFiles('**/go.mod') != '' }}
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: go mod download
        if: ${{ inputs.run_go_install != false && hashFiles('**/go.mod') != '' }}
        run: go mod download

      - name: go vet
        if: ${{ inputs.run_go_install != false && hashFiles('**/go.mod') != '' }}
        run: go vet ./...

      - name: go install
        if: ${{ inputs.run_go_install != false && hashFiles('**/go.mod') != '' }}
        run: go install ./...
        env:
          GOFLAGS: "-mod=readonly"
