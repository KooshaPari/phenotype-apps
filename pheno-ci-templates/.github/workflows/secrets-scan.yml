name: Secrets scan (TruffleHog)

# ---------------------------------------------------------------------------
# pheno-ci-templates — TruffleHog secrets-scan reusable workflow (L5 #111 / G-7)
#
# Absorbed from the two McpKit secrets-scan files on 2026-06-18 as part of
# the McpKit CI absorption (ADR-003):
#   - `McpKit/.github/workflows/secrets-scan.yml` — TruffleHog v3 Docker image
#   - `McpKit/.github/workflows/trufflehog.yml`   — TruffleHog direct CLI
#
# The two source files were deduplicated into this single workflow. The
# modern TruffleHog direct CLI (`trufflehog github`) is used as the default
# since it provides native GitHub authentication and full-history scanning
# in a single step. The legacy path-based Docker scan is preserved as a
# fallback via the `scan_mode` input for callers that need it.
#
# Consumed by any pheno-* repo via:
#
#   jobs:
#     secrets-scan:
#       uses: KooshaPari/pheno-ci-templates/.github/workflows/secrets-scan.yml@main
#       with:
#         scan_mode: "github"
#         only_verified: true
#         base_branch: "main"
#       secrets: inherit
#
# The `secrets: inherit` (or explicit `GITHUB_TOKEN` pass-through) is
# required because TruffleHog uses the GH_TOKEN for GitHub API rate limits
# when scanning a remote repo.
# ---------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      scan_mode:
        description: "TruffleHog scan mode ('github' uses GH CLI; 'filesystem' uses local path scan)"
        required: false
        type: string
        default: "github"
      only_verified:
        description: "Only report verified (live) secrets, skip unverified candidates"
        required: false
        type: boolean
        default: true
      base_branch:
        description: "Base branch for diff-scanning (filesystem mode only)"
        required: false
        type: string
        default: "main"
      runner:
        description: "Runner type for the job"
        required: false
        type: string
        default: "ubuntu-latest"
    secrets:
      GITHUB_TOKEN:
        required: false
  workflow_dispatch:
    inputs:
      scan_mode:
        description: "Scan mode (github | filesystem)"
        required: false
        type: string
        default: "github"
      only_verified:
        description: "Only verified secrets"
        required: false
        type: boolean
        default: true
      base_branch:
        description: "Base branch (filesystem mode)"
        required: false
        type: string
        default: "main"

permissions:
  contents: read

concurrency:
  group: secrets-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trufflehog:
    name: TruffleHog (${{ inputs.scan_mode }})
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---- filesystem mode (absorbed from secrets-scan.yml) ------------
      # Uses the TruffleHog v3 Docker image to scan a local path against a
      # base branch. Useful when GH_TOKEN is unavailable or when callers
      # want a deterministic diff-scoped scan.
      - name: TruffleHog (filesystem)
        if: ${{ inputs.scan_mode == 'filesystem' }}
        uses: trufflesecurity/trufflehog@b32841520c47f1bdf1f6f4772bac76afe07a9e92
        with:
          path: ./
          base: ${{ inputs.base_branch }}
          extra_args: ${{ inputs.only_verified && '--only-verified' || '' }}

      # ---- github mode (absorbed from trufflehog.yml) ------------------
      # Uses the TruffleHog direct CLI to scan the entire GitHub repo
      # history. Requires the GITHUB_TOKEN secret to be available for API
      # rate-limit headroom. This is the recommended path; the
      # filesystem mode exists for offline / air-gapped callers.
      - name: Set up TruffleHog
        if: ${{ inputs.scan_mode == 'github' }}
        uses: trufflehog/actions/setup@main

      - name: TruffleHog (github)
        if: ${{ inputs.scan_mode == 'github' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS="github --no-update"
          if [ "${{ inputs.only_verified }}" = "true" ]; then
            ARGS="${ARGS} --only-verified"
          fi
          trufflehog ${ARGS}
