# ADR-035 + SEC L50: cargo-deny configuration for pheno-config
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false

[advisories]
version = 2
# Fail the build on unmaintained warnings
unmaintained = "warn"
# Ignore yanked crates for now (re-evaluate quarterly)
yanked = "warn"

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "Zlib",
    "OpenSSL",
    "MIT-0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[features]
# Enabled by `cargo deny check` so the deny.toml itself is part of the check
default = []
