# Cargo configuration for v16 L22 (nextest + sccache adoption).
#
# This config is consumed by cargo when building/testing. It wires in:
# - sccache for compilation caching (CI and local) — opt-in via env var
# - thin LTO defaults with embed-bitcode=yes (required by rustc 1.85+)
# - target dir shared across the workspace for cache efficiency
#
# To use sccache locally, install it first: `cargo install sccache --locked`
# Then set the env var: `export RUSTC_WRAPPER=sccache`

[build]
# use the shared target dir; speeds up CI by reusing artifacts across jobs
target-dir = "target"

# sccache: enable via env var, not via this config.
# Cargo's [build.rustc] is a STRING (the RUSTC_WRAPPER), not a table — the
# previous `[build.rustc]` table syntax (added in v16 L22) was a parse error
# that broke every `cargo` invocation in the monorepo. To use sccache:
#   cargo install sccache --locked
#   export RUSTC_WRAPPER=sccache
# (env var is preserved across workspaces)

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = [
  "-C", "link-arg=-fuse-ld=lld",
  "-C", "codegen-units=256",
  "-C", "lto=thin",
  # rustc 1.85+ requires embed-bitcode=yes whenever LTO is enabled; without
  # this, every build fails with `options -C embed-bitcode=no and -C lto are
  # incompatible`.
  "-C", "embed-bitcode=yes",
]

[target.aarch64-unknown-linux-gnu]
linker = "clang"
rustflags = [
  "-C", "link-arg=-fuse-ld=lld",
  "-C", "codegen-units=256",
  "-C", "lto=thin",
  "-C", "embed-bitcode=yes",
]

[target.x86_64-apple-darwin]
linker = "clang"
rustflags = [
  "-C", "codegen-units=256",
  "-C", "lto=thin",
  "-C", "embed-bitcode=yes",
]

[target.aarch64-apple-darwin]
linker = "clang"
rustflags = [
  "-C", "codegen-units=256",
  "-C", "lto=thin",
  "-C", "embed-bitcode=yes",
]

# Cargo aliases for nextest (L22) — run with `cargo nextest run`
[alias]
# run all tests with nextest, fall back to cargo test if nextest not installed
nt = "nextest"
# run only the fast-feedback subset
nt-fast = ["nextest", "run", "--profile", "fast"]
# run all tests + lint
nt-all = ["nextest", "run", "--workspace", "--all-features"]

# Profile for fast-feedback local iteration
# Usage: `cargo nextest run --profile fast`
# Defined in .config/nextest.toml

# Source for shared compilation cache across the workspace
# Sourced from CI env vars: CARGO_TARGET_DIR, RUSTC_WRAPPER
