<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="FocalPoint macOS Liquid Glass">
  <title>FocalPoint macOS Liquid Glass</title>
  <desc>Hand-authored FocalPoint mark in layered macOS liquid-glass material.</desc>

  <defs>
    <clipPath id="mc-clip">
      <path d="M256,30 C355,30 396,32 422,58 C448,84 482,118 482,256 C482,394 448,428 422,454 C396,480 355,482 256,482 C157,482 116,480 90,454 C64,428 30,394 30,256 C30,118 64,84 90,58 C116,32 157,30 256,30 Z" />
    </clipPath>

    <path id="mc-squircle-path" d="M256,30 C355,30 396,32 422,58 C448,84 482,118 482,256 C482,394 448,428 422,454 C396,480 355,482 256,482 C157,482 116,480 90,454 C64,428 30,394 30,256 C30,118 64,84 90,58 C116,32 157,30 256,30 Z" />

    <linearGradient id="mc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090a0c"/>
      <stop offset="42%" stop-color="#0f221f"/>
      <stop offset="100%" stop-color="#0a1013"/>
    </linearGradient>
    <radialGradient id="mc-blob-tr" cx="76%" cy="22%" r="38%">
      <stop offset="0%" stop-color="#7ebab5" stop-opacity="0.66"/>
      <stop offset="50%" stop-color="#7ebab5" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#090a0c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mc-blob-bl" cx="22%" cy="78%" r="36%">
      <stop offset="0%" stop-color="#f6f5f5" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#090a0c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mc-glass-fill" x1="0.12" y1="0" x2="0.88" y2="1">
      <stop offset="0%" stop-color="#95ccc8" stop-opacity="0.37"/>
      <stop offset="36%" stop-color="#7ebab5" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#090a0c" stop-opacity="0.42"/>
    </linearGradient>

    <filter id="mc-displace" x="-12%" y="-12%" width="124%" height="124%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014 0.018" numOctaves="2" seed="9" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" xChannelSelector="R" yChannelSelector="G" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="soft" />
    </filter>

    <filter id="mc-glass-shine" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="blurredAlpha" />
      <feSpecularLighting in="blurredAlpha" surfaceScale="8" specularConstant="1.1" specularExponent="18" lighting-color="#ffffff" result="spec">
        <fePointLight x="420" y="62" z="220" />
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="specMasked" />
      <feBlend in="SourceGraphic" in2="specMasked" mode="screen" />
    </filter>
  </defs>

  <g clip-path="url(#mc-clip)">
    <use href="#mc-squircle-path" fill="url(#mc-bg)"/>
    <use href="#mc-squircle-path" fill="url(#mc-blob-tr)"/>
    <use href="#mc-squircle-path" fill="url(#mc-blob-bl)"/>
  </g>

  <g clip-path="url(#mc-clip)" filter="url(#mc-displace)" opacity="0.72">
    <use href="#mc-squircle-path" fill="url(#mc-bg)"/>
    <use href="#mc-squircle-path" fill="url(#mc-blob-tr)"/>
  </g>

  <g clip-path="url(#mc-clip)" fill="url(#mc-glass-fill)">
    <path d="M30,30 L482,30 L482,482 L30,482 Z" />
  </g>

  <g clip-path="url(#mc-clip)" filter="url(#mc-glass-shine)" opacity="0.85">
    <path d="M256 46 A210 210 0 1 1 255.99 46" fill="none" stroke="#f6f5f5" stroke-width="14" />
    <path d="M256 104 A152 152 0 1 1 255.99 104" fill="none" stroke="#95ccc8" stroke-width="10" />
    <path d="M256 162 A94 94 0 1 1 255.99 162" fill="none" stroke="#7ebab5" stroke-width="8" />
    <circle cx="256" cy="256" r="12" fill="#95ccc8"/>
    <circle cx="256" cy="46" r="8" fill="#f6f5f5"/>
    <circle cx="256" cy="466" r="8" fill="#f6f5f5"/>
    <circle cx="46" cy="256" r="8" fill="#f6f5f5"/>
    <circle cx="466" cy="256" r="8" fill="#f6f5f5"/>

    <path d="M 188 188 L 226 226" stroke="#f6f5f5" stroke-width="11" stroke-linecap="round"/>
    <path d="M 286 286 L 324 324" stroke="#f6f5f5" stroke-width="11" stroke-linecap="round"/>
    <path d="M 324 188 L 286 226" stroke="#7ebab5" stroke-width="11" stroke-linecap="round"/>
    <path d="M 226 286 L 188 324" stroke="#7ebab5" stroke-width="11" stroke-linecap="round"/>
  </g>

  <use href="#mc-squircle-path" fill="none" stroke="#7ebab5" stroke-width="1.2" stroke-opacity="0.34"/>
  <use href="#mc-squircle-path" fill="none" stroke="#f6f5f5" stroke-width="3" stroke-opacity="0.45"/>
</svg>
