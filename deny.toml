[advisories]
db-path = "$CARGO_HOME/advisory-db"
ignore = [
    { id = "RUSTSEC-2024-0388", reason = "unmaintained - no safe upgrade" },
    { id = "RUSTSEC-2024-0436", reason = "unmaintained - no safe upgrade" },
    { id = "RUSTSEC-2025-0057", reason = "unmaintained - no safe upgrade" },
    { id = "RUSTSEC-2025-0141", reason = "unmaintained - no safe upgrade" },
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSD-3-Clause-Clear",
    "CC0-1.0",
    "CC-BY-SA-4.0",
    "GPL-3.0-only",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
    "BlueOak-1.0.0",
    "CDLA-Permissive-2.0",
    "Unlicense",
    "WTFPL"
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-git = "deny"
unknown-registry = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
