[graph]
all-features = true

[advisories]
version = 2
yanked = "warn"

[unmaintained]
version = 2
notification = "warn"

[bans]
version = 2
multiple-versions = "warn"
wildcards = "deny"
deny = [
    { name = "ring", version = "<0.17" },
]
skip = []
skip-tree = []

[bans.multiple-versions]
deny = [
    "AGPL-3.0",
    "SSPL-1.0",
    "Commons-Clause",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
]

[sources]
unknown-registry = "allow"
unknown-git = "allow"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
