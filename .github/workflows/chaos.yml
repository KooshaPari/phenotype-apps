name: chaos-test-fleet

on:
  push:
    branches: [main, chore/v1*-**]
  pull_request:
  schedule:
    # Weekly Monday 09:00 PDT
    - cron: '0 16 * * 1'
  workflow_dispatch:

jobs:
  chaos-port-adapter:
    name: pheno-port-adapter chaos (L11 1->3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: cargo test --release chaos
        working-directory: pheno-port-adapter
        run: cargo test --release --tests -- --test-threads=1

  chaos-fuzz-port-adapter:
    name: pheno-port-adapter fuzz endpoint (L11.1)
    runs-on: ubuntu-latest
    continue-on-error: true  # fuzz is best-effort nightly
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: cargo fuzz run endpoint (60s)
        working-directory: pheno-port-adapter
        run: |
          cargo install cargo-fuzz
          cd fuzz
          cargo fuzz run fuzz_endpoint -- -max_total_time=60

  chaos-flags-stress:
    name: pheno-flags stress (L11 stress)
    runs-on: ubuntu-latest
    # pheno-flags is a separate KooshaPari/pheno-flags repo, not vendored into
    # phenotype-apps. Stress test is staged for the next 71-pillar cycle.
    # See findings/2026-06-21-v14-ci-rot-diagnosis.md (A3).
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo bench (criterion) [skipped — pheno-flags not vendored]
        if: hashFiles('pheno-flags/Cargo.toml') != ''
        working-directory: pheno-flags
        run: cargo bench --no-run
      - name: 'pheno-flags stress (no-op: pheno-flags/ not vendored on main)'
        if: hashFiles('pheno-flags/Cargo.toml') == ''
        run: |
          echo "pheno-flags/ is not vendored on this branch — stress test skipped."
          echo "Substrate lives in KooshaPari/pheno-flags (separate repo)."
          test -d pheno-flags || exit 0
