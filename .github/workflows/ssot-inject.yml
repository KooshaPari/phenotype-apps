name: ssot-inject
on: [push, workflow_dispatch]

jobs:
  ssot-inject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ssot-inject (dry-run)
        run: |
          if [ -x scripts/ssot_inject.sh ] || [ -f scripts/ssot_inject.sh ]; then
            bash scripts/ssot_inject.sh --dry-run
          else
            echo "scripts/ssot_inject.sh is absent; skipping ssot-inject dry-run."
          fi
      - name: Commit if changed
        run: |
          if [ ! -x scripts/ssot_inject.sh ] && [ ! -f scripts/ssot_inject.sh ]; then
            echo "scripts/ssot_inject.sh is absent; skipping ssot-inject commit step."
            exit 0
          fi
          bash scripts/ssot_inject.sh
          if [[ -n "$(git status --porcelain | grep -E '\.md$')" ]]; then
            git config user.name "ssot-inject-bot"
            git config user.email "bot@phenotype.local"
            git add $(git status --porcelain | grep -E '\.md$' | awk '{print $2}')
            git commit -m "chore(ssot): auto-inject missing required sections"
            git push
          else
            echo "No changes"
          fi
