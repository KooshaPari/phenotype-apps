name: ADR Lint
on:
  push:
    branches: [main]
    paths:
      - 'docs/adr/**'
      - 'scripts/adr_backlink_check.py'
      - 'scripts/adr_backlink_baseline.txt'
      - '.github/workflows/adr-lint.yml'
  pull_request:
    paths:
      - 'docs/adr/**'
      - 'scripts/adr_backlink_check.py'
      - 'scripts/adr_backlink_baseline.txt'
      - '.github/workflows/adr-lint.yml'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  adr-backlinks:
    name: Verify ADR cross-references
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Parse broken pairs
        run: |
          python3 scripts/adr_backlink_check.py --quiet > /tmp/broken.txt 2>&1 || true
          python3 -c "
          import re
          LINE_RE = re.compile(r'^\s*(ADR-\d+B?)\s*\(.*?\):\s*->\s*(ADR-\d+B?)\s*\(.*\)\s*\$')
          pairs = set()
          for line in open('/tmp/broken.txt'):
              m = LINE_RE.match(line)
              if m:
                  pairs.add(f'{m.group(1)}|{m.group(2)}')
          for p in sorted(pairs):
              print(p)
          " > /tmp/broken-pairs.txt
          echo "--- Broken ADR cross-refs detected in this run ---"
          cat /tmp/broken-pairs.txt || true
      - name: Compare against baseline (regression-only gate)
        run: |
          grep --color=never -E '^ADR-[0-9]+B?\|' scripts/adr_backlink_baseline.txt | sort -u > /tmp/baseline.txt
          echo "Baseline: $(wc -l < /tmp/baseline.txt) known broken pairs"
          echo "Current:  $(wc -l < /tmp/broken-pairs.txt) broken pairs"
          comm -23 /tmp/broken-pairs.txt /tmp/baseline.txt > /tmp/new-broken.txt || true
          if [ -s /tmp/new-broken.txt ]; then
            {
              echo "## ADR cross-reference regression detected"
              echo ""
              echo "| Source ADR | Missing target |"
              echo "|------------|----------------|"
              while IFS='|' read -r src tgt; do
                [ -z "$src" ] && continue
                echo "| $src | $tgt |"
              done < /tmp/new-broken.txt
              echo ""
              echo "Either (1) create the missing ADR, (2) remove the dangling reference,"
              echo "or (3) add the pair to scripts/adr_backlink_baseline.txt with a justification."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "OK: no new broken ADR cross-references."
