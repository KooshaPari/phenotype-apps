name: gitleaks

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Daily at 06:00 UTC (~ 23:00 PDT / 22:00 PST)
    - cron: "0 6 * * *"

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # On PRs only scan the diff; on schedule scan full history (default)
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"