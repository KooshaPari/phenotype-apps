# v12 T11 — L67 CHANGELOG auto-generation workflow
# Triggers on tag push (v*), regenerates CHANGELOG.md, commits back.

name: changelog

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Generate CHANGELOG
        run: |
          TAG="${GITHUB_REF_NAME}"
          git-cliff --tag "${TAG}" --output CHANGELOG.md
          echo "## Generated CHANGELOG sections:" >> $GITHUB_STEP_SUMMARY
          grep '^## ' CHANGELOG.md | head -20 >> $GITHUB_STEP_SUMMARY

      - name: Commit CHANGELOG back
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs(changelog): regenerate for ${GITHUB_REF_NAME} [skip ci]"
          git push
