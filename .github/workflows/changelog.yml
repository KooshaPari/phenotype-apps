# v12 T11 — L67 CHANGELOG auto-generation workflow (tag-driven, release time)
# Triggers on tag push (v*), regenerates CHANGELOG.md in full, commits back.
#
# NOTE — propose/publish split (V19-T4, 2026-06-21, L67 deepening):
#   - This file:   PUBLISH  — tag-driven, regenerates the full CHANGELOG.md
#                             on every release tag (uses git-cliff).
#   - changelog-pr.yml: PROPOSE — push-to-main, opens/updates a PR with the
#                                 refreshed [Unreleased] block (uses
#                                 scripts/auto-changelog.py).
#
# Both workflows coexist. The propose workflow provides continuous
# pre-release visibility; this workflow provides authoritative release-time
# regeneration. They share the same cliff.toml type-enum (see cliff.toml
# header comment for the sync policy with .commitlintrc.json).
#
# The PR opened by changelog-pr.yml should be merged BEFORE the release tag
# is cut so this workflow can regenerate the full file from the consolidated
# history.

name: changelog

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Generate CHANGELOG
        run: |
          TAG="${GITHUB_REF_NAME}"
          git-cliff --tag "${TAG}" --output CHANGELOG.md
          echo "## Generated CHANGELOG sections:" >> $GITHUB_STEP_SUMMARY
          grep '^## ' CHANGELOG.md | head -20 >> $GITHUB_STEP_SUMMARY

      - name: Commit CHANGELOG back
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs(changelog): regenerate for ${GITHUB_REF_NAME} [skip ci]"
          git push
