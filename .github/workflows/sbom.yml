name: sbom
on: [push, pull_request]

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM (skipped if no root Cargo.toml)
        run: |
          if [ -f Cargo.toml ]; then
            cargo cyclonedx --format json --override-filename sbom.json
          else
            echo "no Cargo.toml at repo root — skipping sbom (subcrate manifests can be vendored later)"
            echo "[]" > sbom.json
          fi
      - name: fail on GPL/AGPL addition
        run: |
          if [ -f sbom.json ] && jq -r '.components[]?.licenses[]?.license.id // empty' sbom.json | grep -E 'GPL|AGPL'; then
            echo "GPL/AGPL license detected"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
