# v25 cycle-15 T4 — L45 perf regression alert
# Label-gated: fires on PR labeled `perf-regression`. Saves bench history to
# gh-pages via GH_PAGES_PUSH_TOKEN, compares vs main, fails on >5% regression.

name: perf-regression

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  perf-regression:
    if: github.event.label.name == 'perf-regression'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2

      - name: Run benchmarks (bencher format)
        run: cargo bench -- --output-format bencher | tee current.txt

      - name: Install cargo-bench-history
        run: cargo install cargo-bench-history --locked

      - name: Save baseline to gh-pages
        env:
          GH_TOKEN: ${{ secrets.GH_PAGES_PUSH_TOKEN }}
        run: |
          git config user.name  "perf-regression-bot"
          git config user.email "perf-regression-bot@users.noreply.github.com"
          cargo bench-history save --branch "${{ github.head_ref }}"

      - name: Compare against main (>5% fails)
        id: compare
        env:
          GH_TOKEN: ${{ secrets.GH_PAGES_PUSH_TOKEN }}
        run: |
          set +e
          cargo bench-history compare main --threshold 5 | tee compare.txt
          echo "exit=$?" >> "$GITHUB_OUTPUT"

      - name: Comment PR with delta
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const compare = fs.readFileSync('compare.txt', 'utf8');
            const marker = '<!-- perf-regression-bot -->';
            const body = `${marker}\n## L45 perf-regression report\n\n\`\`\`\n${compare.trim()}\n\`\`\`\n\n_Threshold: 5% regression. Comment auto-updates on re-run._`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, per_page: 100
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body
              });
            }

      - name: Fail on regression
        if: steps.compare.outputs.exit != '0'
        run: |
          echo "::error::Bench regression >5% detected. See PR comment."
          exit 1
