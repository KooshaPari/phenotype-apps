# Fleet perf gate — v19 T4 (L19 Performance Benchmarking Infrastructure deepening)
# Authority: ADR-040 (test coverage gates per tier) + v19 71-pillar cycle 9 plan §2 Track T4.
# Builds scripts/perf-gate (Rust) and runs the `perf_gate` binary against
# benchmarks/fleet-perf.toml. Fails the build on hard regressions; uploads
# the JSON verdict as a workflow artifact for downstream consumers.
name: Fleet perf gate

on:
  push:
    branches: [main]
    paths:
      - "benchmarks/fleet-perf.toml"
      - ".github/workflows/perf-gate.yml"
      - "scripts/perf-gate/**"
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: perf-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  perf-gate:
    name: perf-gate (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: scripts/perf-gate -> target

      - name: Build perf-gate (release)
        working-directory: scripts/perf-gate
        run: cargo build --release

      - name: Run perf gate (human-readable text)
        working-directory: scripts/perf-gate
        run: |
          mkdir -p findings
          ./target/release/perf_gate \
            --budgets ../../benchmarks/fleet-perf.toml \
            2>&1 | tee ../../findings/perf-gate-result.txt
        continue-on-error: false

      - name: Run perf gate (JSON artifact)
        working-directory: scripts/perf-gate
        if: always()
        run: |
          mkdir -p findings
          ./target/release/perf_gate \
            --budgets ../../benchmarks/fleet-perf.toml \
            --format json \
            > ../../findings/perf-gate-result.json || true

      - name: Upload perf-gate verdict artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-gate-result-${{ github.run_id }}
          path: findings/perf-gate-result.json
          if-no-files-found: warn
