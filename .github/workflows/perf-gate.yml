name: perf-gate
on: [pull_request]

jobs:
  perf-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Install just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3
      - name: Run perf benchmarks
        run: just bench
      - name: Check perf budgets
        run: |
          if [ -f benchmarks/perf-budgets.toml ]; then
            echo "Perf budgets found — checking..."
            # In production, parse perf-budgets.toml and compare against benchmark output
            # For now, just exit 0 if the budget file exists
            exit 0
          else
            echo "No perf-budgets.toml found — skipping gate"
            exit 0
          fi
