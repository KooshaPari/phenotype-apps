name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-sboms:
    name: Validate SBOMs
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Validate CycloneDX JSON
        run: |
          for f in $(find . -name "*.cdx.json"); do
            python -c "import json; json.load(open('$f'))" || exit 1
            echo "OK: $f"
          done

  secrets:
    name: TruffleHog secrets scan
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extraArgs: --no-history
