name: Trufflehog Secrets Scan
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read


jobs:
  trufflehog:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@78961f6f84d799cd858575bb931c3e51d3b13290 # v5
        with:
          go-version: 'stable'
      - name: Install trufflehog
        run: |
          curl -sSL -o trufflehog.tar.gz \
            "https://github.com/trufflesecurity/trufflehog/releases/download/v3.95.5/trufflehog_3.95.5_linux_amd64.tar.gz"
          tar -xzf trufflehog.tar.gz
          sudo mv trufflehog /usr/local/bin/trufflehog
      - run: trufflehog github --repo=$GITHUB_REPOSITORY --only-verified --no-update
