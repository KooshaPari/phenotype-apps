[package]
name = "pheno-errors-macros"
version = "0.1.0"
edition = "2021"
description = "Proc macros for pheno-errors (span annotations per L42)"
license = "MIT OR Apache-2.0"

[lib]
proc-macro = true

[dependencies]
syn = { version = "2.0", features = ["full", "extra-traits"] }
quote = "1.0"
proc-macro2 = "1.0"
# Spans from the parse tree, used to attach source locations to error
# codes generated by `#[derive(Documented)]`.
proc-macro-error = "1.0"

[dev-dependencies]
trybuild = "1.0"
