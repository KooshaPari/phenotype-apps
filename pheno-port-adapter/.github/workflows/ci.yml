name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Cancel any in-flight run for the same ref; we only care about the
# latest commit on a branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Read-only token by default; jobs that need more override per-step.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (stable)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --all-features --no-fail-fast

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings

  fmt:
    name: fmt --check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  module-deps:
    name: module-deps (cargo-modules --acyclic, L4)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-modules
      - name: cargo-modules dependencies --acyclic
        run: |
          echo "Running cargo-modules v$(cargo-modules --version)"
          # --no-fns / --no-traits / --no-types filter false-positive cycles
          # from impl blocks (e.g. impl Display for Foo where Foo::fmt
          # references Self). Real cycles are still flagged as non-zero
          # exit, but the gate is `continue-on-error: true` so the result
          # is surfaced in CI logs without blocking the PR.
          cargo-modules dependencies --acyclic --no-fns --no-traits --no-types || true
      - name: Upload module-deps report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module-deps-report
          path: module-deps.txt
          if-no-files-found: ignore

  coverage:
    name: coverage (llvm-cov)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-llvm-cov
      - run: cargo llvm-cov --all-features --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
