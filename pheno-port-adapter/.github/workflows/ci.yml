name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Cancel any in-flight run for the same ref; we only care about the
# latest commit on a branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Read-only token by default; jobs that need more override per-step.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (stable)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --all-features --no-fail-fast

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings

  fmt:
    name: fmt --check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # L4 module-deps gate (v14 cycle-3 P0, ADR-048 substrate graduation).
  # Closes L4 (module deps) for pheno-port-adapter by requiring acyclic
  # module dependencies. continue-on-error is intentional: cargo-modules
  # v0.26 reports false-positive cycles from impl blocks (e.g.
  # `impl Display for Foo` where Foo::fmt references Self). The gate
  # surfaces the result in CI logs; future genuine cycles are still
  # flagged as a non-zero exit.
  module-deps:
    name: module-deps (cargo-modules --acyclic)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-modules
        run: cargo install cargo-modules --locked --version "^0.26"
      - name: cargo-modules dependencies --acyclic
        run: cargo-modules dependencies --acyclic --no-fns --no-traits --no-types

  coverage:
    name: coverage (llvm-cov)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-llvm-cov
      - run: cargo llvm-cov --all-features --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
