[plugin]
name = "connector-hello"
version = "0.1.0"
authors = ["FocalPoint <dev@focalpoint.app>"]
description = "Minimal reference connector demonstrating WASM sandbox"
type = "connector"
api_version = "0.1.0"

[capabilities]
http = false
timer = false

[interface.connector]
scope = "workspace"
auth = "none"
events = [
  { name = "hello", fields = ["message"] }
]
