[plugin]
name = "connector-slack"
version = "0.1.0"
authors = ["FocalPoint <support@focalpoint.dev>"]
description = "Slack workspace event connector: message_posted events via Slack API"
type = "connector"
api_version = "0.1.0"

# HTTP capability: declare allowed domains for Slack API
[capabilities.http]
allowlist = ["api.slack.com", "hooks.slack.com"]

# Connector interface specification
[interface.connector]
scope = "workspace"
auth = "oauth2"

# Events this connector emits
[[interface.connector.events]]
name = "message_posted"
fields = ["user", "text", "thread_ts", "timestamp"]

[[interface.connector.events]]
name = "file_shared"
fields = ["user", "file_url", "timestamp"]
