[workspace]

[package]
name = "pheno-flags"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
rust-version = "1.82"
description = "Canonical synchronous, in-memory feature-flag set for the Phenotype monorepo. Reads boolean flags from environment variables with a configurable prefix."
keywords = ["phenotype", "feature-flags", "config", "env", "ff-free"]
categories = ["config", "development-tools"]
publish = true

[lib]
name = "pheno_flags"
path = "src/lib.rs"

[features]
default = []
# ADR-036: tracing feature flag (off by default). Enables the `tracing`
# macros so `FlagSet::get` and friends can emit span events. The
# canonical pheno-tracing substrate lives in `crates/pheno-tracing`;
# the dev-dep `tracing-test` asserts span emission in tests/tracing_test.rs.
tracing = ["dep:tracing"]

[dependencies]
thiserror = "2"
tracing = { version = "0.1", optional = true }

[dev-dependencies]
# ADR-036: test that tracing spans emit (use OTEL_SDK_DISABLED=true in CI)
tracing-test = "0.2"
