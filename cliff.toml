# Configuration for git-cliff: https://git-cliff.org/
# Generates CHANGELOG from conventional commits.
#
# This file is consumed by .github/workflows/changelog.yml on tag push (v*).
# Companion automation: .github/workflows/changelog-pr.yml runs on push-to-main
# and uses scripts/auto-changelog.py to propose the [Unreleased] block via PR.
#
# The TYPE_TO_SECTION map in scripts/auto-changelog.py mirrors the
# commit_parsers below — keep them in sync if you add a new type.
# Allowed types per .commitlintrc.json:
#   feat, fix, chore, docs, refactor, test, build, ci, perf, revert
#
# ADR-024 (71-pillar framework, L67 CHANGELOG auto), V19-T4 (2026-06-21)

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
"""

body = """
{%- for group, commits in commits | group_by(attribute="group") %}
## {{ group | replace(from="Features", to="✨ Features") | replace(from="Bug Fixes", to="🐛 Bug Fixes") | replace(from="Documentation", to="📚 Documentation") | replace(from="Performance", to="⚡ Performance") | replace(from="Refactoring", to="♻️ Refactoring") | replace(from="Testing", to="🧪 Testing") | replace(from="Build", to="📦 Build") | replace(from="Reverts", to="⏪ Reverts") }}

{%- for commit in commits %}
- {% if commit.breaking %}**BREAKING** {% endif %}{{ commit.message | upper_first }} (`{{ commit.id | truncate(length=7, end="") }}`){%- if commit.body %}
  {{ commit.body | indent(prefix="  > ") }}{%- endif %}
{%- endfor %}
{%- endfor %}
"""

# Separate template for the [Unreleased] section (used by `git-cliff --unreleased`).
# Mirrors the output format of scripts/auto-changelog.py so reviewers see the
# same section shape whether the bot regenerates via the script or via cliff.
[changelog.unreleased]
body = """
{%- if commits %}
## [Unreleased]

_Auto-generated by `git-cliff` (V19-T4, L67) — {{ commits | length }} commit(s) since the last release tag._

{%- for group, commits in commits | group_by(attribute="group") %}
### {{ group | replace(from="Features", to="Features") | replace(from="Bug Fixes", to="Bug Fixes") | replace(from="Documentation", to="Documentation") | replace(from="Performance", to="Performance") | replace(from="Refactoring", to="Refactoring") | replace(from="Testing", to="Testing") | replace(from="Build", to="Build") | replace(from="Reverts", to="Reverts") }}

{%- for commit in commits %}
- {% if commit.breaking %}**BREAKING** {% endif %}{{ commit.message | upper_first }} (`{{ commit.id | truncate(length=7, end="") }}`)
{%- endfor %}
{%- endfor %}
{%- else %}
## [Unreleased]

_No conventional commits since the last release tag._
{%- endif %}
"""

footer = """
---

**Release Date:** {{ now | date(format="%Y-%m-%d") }}
"""

trim = true

[git]
conventional_commits = true
# Tags follow the vMAJOR.MINOR.PATCH convention (CalVer allowed via prefix).
# Examples: v0.0.12, v1.2.3, v2026.06.21.
tag_pattern = "v[0-9].*"
# Skip the empty initial commit and any pre-release tags we don't want surfaced.
skip_tags = "v0.0.0"
sort_commits = "newest"
# Recurse into merge commits to surface `Merge pull request #N from ...` titles
# when a squash-merge isn't used. Default: false. Fleet uses squash merges, so
# this is kept off to avoid noise.
link_parsers = []

# Commit-grouping rules. Order matters — first match wins.
# Mirrors scripts/auto-changelog.py:TYPE_TO_SECTION.
commit_parsers = [
  # Conventional Commits types — listed by conventional-commit-type priority
  {message = "^feat", group = "Features"},
  {message = "^fix", group = "Bug Fixes"},
  {message = "^perf", group = "Performance"},
  {message = "^refactor", group = "Refactoring"},
  {message = "^doc", group = "Documentation"},
  {message = "^test", group = "Testing"},
  {message = "^build", group = "Build"},
  {message = "^revert", group = "Reverts"},
  # House-keeping buckets — kept out of the release view but visible in the
  # changelog-bot PR for context. (git-cliff uses `skip = true` to drop;
  # `scripts/auto-changelog.py` uses a different bucketing strategy
  # — see TYPE_TO_SECTION.)
  {message = "^chore", skip = true},
  {message = "^ci", skip = true},
  # Fleet-internal markers (from .commitlintrc.json extended enums in some
  # sub-repos): wip snapshots, recovery commits, dep bumps, etc.
  {message = "^wip", skip = true},
  {message = "^bump", skip = true},
]

commit_filters = [
  # Subject markers that opt a commit OUT of any changelog bucket.
  {remove_if_matches = ".*skip.*changelog.*"},
  {remove_if_matches = ".*\\[skip changelog\\].*"},
  {remove_if_matches = ".*\\[skip-changelog\\].*"},
  # Recovery-script and co-authored-bot commits should not pollute release notes.
  {remove_if_matches = ".*Co-authored-by: Recovery Script.*"},
  {remove_if_matches = ".*Co-authored-by: Cursor.*"},
]
